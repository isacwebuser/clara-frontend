name: orflux_frontend
description: OrFlux SaaS Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  retrofit: ^4.5.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.0.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI Utils
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.20.2
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  jwt_decoder: ^2.0.1
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
